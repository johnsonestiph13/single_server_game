# .github/workflows/deploy-bot.yml
# Estif Bingo 24/7 - Deploy Bot Workflow
# Automatically deploys the bot to Render on push to main branch

name: Deploy Bot

on:
  push:
    branches: [main]
    paths:
      - 'telegram-bot/**'
      - '.github/workflows/deploy-bot.yml'
  pull_request:
    branches: [main]
    paths:
      - 'telegram-bot/**'
  workflow_dispatch:  # Allow manual trigger

env:
  PYTHON_VERSION: '3.11'
  RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
  RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}

jobs:
  # ==================== TESTING ====================
  
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('telegram-bot/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Install dependencies
        run: |
          cd telegram-bot
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov
      
      - name: Run tests
        run: |
          cd telegram-bot
          pytest tests/ -v --cov=bot --cov-report=xml --cov-report=html
      
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: telegram-bot/htmlcov/
      
      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: telegram-bot/test-results/

  # ==================== LINTING ====================
  
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install linting tools
        run: |
          pip install flake8 black isort mypy
      
      - name: Run flake8
        run: |
          cd telegram-bot
          flake8 bot/ --count --max-complexity=10 --statistics
      
      - name: Run black check
        run: |
          cd telegram-bot
          black --check bot/
      
      - name: Run isort check
        run: |
          cd telegram-bot
          isort --check-only bot/
      
      - name: Run mypy
        run: |
          cd telegram-bot
          mypy bot/ --ignore-missing-imports

  # ==================== BUILD ====================
  
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [test, lint]
    if: success() && github.event_name == 'push'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-
      
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./telegram-bot
          file: ./telegram-bot/Dockerfile
          push: false
          tags: estif-bingo:latest
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new
      
      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

  # ==================== DEPLOY TO RENDER ====================
  
  deploy-render:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: build
    if: success() && github.event_name == 'push'
    environment:
      name: production
      url: https://estif-bingo-bot-1.onrender.com
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Deploy to Render
        uses: johnbeynon/render-deploy-action@v1.1.0
        with:
          service-id: ${{ secrets.RENDER_SERVICE_ID }}
          api-key: ${{ secrets.RENDER_API_KEY }}
          wait-for-success: true
      
      - name: Wait for deployment
        run: |
          echo "Waiting for deployment to complete..."
          sleep 30
      
      - name: Health check
        run: |
          curl -f https://estif-bingo-bot-1.onrender.com/health || exit 1
          curl -f https://estif-bingo-advanced-1.onrender.com/health || exit 1
      
      - name: Notify deployment status
        uses: actions/github-script@v7
        with:
          script: |
            const message = `🚀 Deployment completed!\n\nEnvironment: production\nService: Estif Bingo Bot\nURL: https://estif-bingo-bot-1.onrender.com\nGame URL: https://estif-bingo-advanced-1.onrender.com\nStatus: ✅ Success`;
            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: message
            });

  # ==================== DEPLOY TO ALTERNATIVE (Heroku/Other) ====================
  
  # Uncomment if deploying to Heroku
  # deploy-heroku:
  #   name: Deploy to Heroku
  #   runs-on: ubuntu-latest
  #   needs: build
  #   if: false  # Disabled by default
  #   
  #   steps:
  #     - name: Checkout code
  #       uses: actions/checkout@v4
  #     
  #     - name: Deploy to Heroku
  #       uses: akhileshns/heroku-deploy@v3.13.15
  #       with:
  #         heroku_api_key: ${{ secrets.HEROKU_API_KEY }}
  #         heroku_app_name: ${{ secrets.HEROKU_APP_NAME }}
  #         heroku_email: ${{ secrets.HEROKU_EMAIL }}
  #         appdir: "telegram-bot"

  # ==================== DATABASE MIGRATIONS ====================
  
  run-migrations:
    name: Run Database Migrations
    runs-on: ubuntu-latest
    needs: deploy-render
    if: success()
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          cd telegram-bot
          pip install -r requirements.txt
      
      - name: Run migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SKIP_AUTO_MIGRATIONS: false
        run: |
          cd telegram-bot
          python -c "from bot.db.database import db; import asyncio; asyncio.run(db.run_migrations('bot/db/migrations'))"
      
      - name: Verify migrations
        run: |
          echo "Migrations completed successfully"

  # ==================== NOTIFICATIONS ====================
  
  notify-success:
    name: Notify Success
    runs-on: ubuntu-latest
    needs: [deploy-render, run-migrations]
    if: success()
    
    steps:
      - name: Send Telegram notification
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            🚀 *Deployment Successful!*
            
            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            
            *Bot URL:* https://estif-bingo-bot-1.onrender.com
            *Game URL:* https://estif-bingo-advanced-1.onrender.com
            
            Deployed by: ${{ github.actor }}

  notify-failure:
    name: Notify Failure
    runs-on: ubuntu-latest
    needs: [deploy-render, run-migrations]
    if: failure()
    
    steps:
      - name: Send Telegram notification
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ❌ *Deployment Failed!*
            
            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            
            Failed job: ${{ github.job }}
            
            Check workflow: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

  # ==================== CLEANUP ====================
  
  cleanup:
    name: Cleanup
    runs-on: ubuntu-latest
    needs: [deploy-render, run-migrations]
    if: always()
    
    steps:
      - name: Delete old artifacts
        uses: geekyeggo/delete-artifact@v5
        with:
          name: |
            coverage-report
            test-results
          failOnError: false